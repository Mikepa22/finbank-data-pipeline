# =============================================================================
# Entorno Conda — FinBank Data Pipeline
# =============================================================================
# Uso:
#   conda env create -f environment.yml
#   conda activate finbank
# =============================================================================

name: finbank
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pandas>=2.0
  - numpy>=1.24
  - pyarrow>=14.0
  - pyyaml>=6.0
  - sqlalchemy>=2.0
  - pyodbc>=5.0
  - pytest>=7.0
  - pip
  - pip:
    - databricks-cli>=0.18
